<!DOCTYPE html>
<html>
<head>
  <title>Callee</title>
</head>
<body>

<h2>Callee</h2>

<button onclick="acceptCall()">
  Accept Call
</button>

<audio id="remoteAudio" autoplay></audio>

<script src="https://cdn.socket.io/4.8.1/socket.io.min.js"></script>

<script>

const socket = io(
  "http://localhost:3010",
  {
    query: {
      userId: "user2"
    }
  }
);

const remoteAudio =
  document.getElementById(
    "remoteAudio"
  );

const pc =
  new RTCPeerConnection({

    iceServers: [
      {
        urls:
          "stun:stun.l.google.com:19302"
      }
    ]

  });

navigator.mediaDevices
  .getUserMedia({
    audio: true
  })
  .then(stream => {

    stream
      .getTracks()
      .forEach(track => {

        pc.addTrack(
          track,
          stream
        );

      });

  });

pc.ontrack = (event) => {

  remoteAudio.srcObject =
    event.streams[0];

};

pc.onicecandidate =
  (event) => {

    if (event.candidate) {

      socket.emit(
        "ICE_CANDIDATE",
        {
          targetUserId: "user1",
          candidate: event.candidate
        }
      );

    }

  };

let callerId = null;

socket.on(
  "INCOMING_CALL",
  (data) => {

    callerId =
      data.callerId;

    alert(
      `Incoming call from ${callerId}`
    );

  }
);

async function acceptCall() {

  socket.emit(
    "ACCEPT_CALL",
    {
      callerId
    }
  );

}

socket.on(
  "WEBRTC_OFFER",
  async (data) => {

    await pc.setRemoteDescription(
      data.offer
    );

    const answer =
      await pc.createAnswer();

    await pc.setLocalDescription(
      answer
    );

    socket.emit(
      "WEBRTC_ANSWER",
      {
        callerId,
        answer
      }
    );

  }
);

socket.on(
  "ICE_CANDIDATE",
  async (data) => {

    try {

      await pc.addIceCandidate(
        data.candidate
      );

    } catch {}

  }
);

</script>

</body>
</html>
